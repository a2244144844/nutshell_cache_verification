<svg viewBox="0 0 680 780" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <title>Cache验证环境执行流程图</title>
  <desc>从pytest启动到测试结束的完整执行流程</desc>

  <style>
    .th { font-family: -apple-system, sans-serif; font-size: 14px; font-weight: 500; }
    .ts { font-family: -apple-system, sans-serif; font-size: 12px; font-weight: 400; }
  </style>

  <!-- pytest 启动 -->
  <rect x="220" y="15" width="240" height="44" rx="8" fill="#FFFFFF" stroke="#534AB7" stroke-width="1"/>
  <text class="th" x="340" y="37" text-anchor="middle" dominant-baseline="central" fill="#26215C">pytest 启动</text>

  <line x1="340" y1="59" x2="340" y2="79" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- conftest.py -->
  <rect x="220" y="80" width="240" height="44" rx="8" fill="#FFFFFF" stroke="#534AB7" stroke-width="1"/>
  <text class="th" x="340" y="102" text-anchor="middle" dominant-baseline="central" fill="#26215C">conftest.py 加载 fixture</text>

  <line x1="340" y1="124" x2="340" y2="144" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- CacheEnv.create -->
  <rect x="200" y="145" width="280" height="56" rx="8" fill="#FFFFFF" stroke="#185FA5" stroke-width="1"/>
  <text class="th" x="340" y="163" text-anchor="middle" dominant-baseline="central" fill="#0C447C">create_dut() → CacheEnv.create()</text>
  <text class="ts" x="340" y="183" text-anchor="middle" dominant-baseline="central" fill="#0C447C">实例化全部验证组件</text>

  <!-- Branch to parallel -->
  <line x1="340" y1="201" x2="340" y2="218" stroke="#888780" stroke-width="1"/>
  <line x1="100" y1="218" x2="580" y2="218" stroke="#888780" stroke-width="1"/>
  <line x1="100" y1="218" x2="100" y2="235" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="220" y1="218" x2="220" y2="235" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="340" y1="218" x2="340" y2="235" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="460" y1="218" x2="460" y2="235" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="580" y1="218" x2="580" y2="235" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="20" y="236" width="160" height="44" rx="8" fill="#FFFFFF" stroke="#1D9E75" stroke-width="1"/>
  <text class="th" x="100" y="258" text-anchor="middle" dominant-baseline="central" fill="#085041">DUTCache 实例化</text>

  <rect x="185" y="236" width="70" height="44" rx="8" fill="#FFFFFF" stroke="#D85A30" stroke-width="1"/>
  <text class="th" x="220" y="258" text-anchor="middle" dominant-baseline="central" fill="#712B13">Mock</text>

  <rect x="305" y="236" width="70" height="44" rx="8" fill="#FFFFFF" stroke="#D85A30" stroke-width="1"/>
  <text class="th" x="340" y="258" text-anchor="middle" dominant-baseline="central" fill="#712B13">Callback</text>

  <rect x="425" y="236" width="70" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
  <text class="th" x="460" y="258" text-anchor="middle" dominant-baseline="central" fill="#444441">XClock</text>

  <rect x="545" y="236" width="70" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
  <text class="th" x="580" y="258" text-anchor="middle" dominant-baseline="central" fill="#444441">XPort</text>

  <!-- Merge -->
  <line x1="100" y1="280" x2="100" y2="300" stroke="#888780" stroke-width="1"/>
  <line x1="220" y1="280" x2="220" y2="300" stroke="#888780" stroke-width="1"/>
  <line x1="340" y1="280" x2="340" y2="300" stroke="#888780" stroke-width="1"/>
  <line x1="460" y1="280" x2="460" y2="300" stroke="#888780" stroke-width="1"/>
  <line x1="580" y1="280" x2="580" y2="300" stroke="#888780" stroke-width="1"/>
  <line x1="100" y1="300" x2="580" y2="300" stroke="#888780" stroke-width="1"/>
  <line x1="340" y1="300" x2="340" y2="317" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="240" y="318" width="200" height="44" rx="8" fill="#FFFFFF" stroke="#185FA5" stroke-width="1"/>
  <text class="th" x="340" y="340" text-anchor="middle" dominant-baseline="central" fill="#0C447C">env.reset() 复位 Cache</text>

  <line x1="340" y1="362" x2="340" y2="382" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Test execution -->
  <rect x="180" y="383" width="320" height="150" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text class="th" x="340" y="403" text-anchor="middle" dominant-baseline="central" fill="#0C447C">测试函数执行</text>

  <rect x="200" y="415" width="280" height="30" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text class="ts" x="340" y="430" text-anchor="middle" dominant-baseline="central" fill="#633806">覆盖率标记 dut.fc_cover["FG-XXX"]</text>

  <rect x="200" y="453" width="280" height="30" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text class="ts" x="340" y="468" text-anchor="middle" dominant-baseline="central" fill="#633806">api_cache_send_cpu_request() 发送请求</text>

  <rect x="200" y="491" width="280" height="30" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text class="ts" x="340" y="506" text-anchor="middle" dominant-baseline="central" fill="#633806">内部 handle refill / writeback / Mock 交互</text>

  <line x1="340" y1="533" x2="340" y2="553" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="240" y="554" width="200" height="44" rx="8" fill="#FFFFFF" stroke="#D4537E" stroke-width="1"/>
  <text class="th" x="340" y="576" text-anchor="middle" dominant-baseline="central" fill="#72243E">断言验证 &amp; 结果判定</text>

  <line x1="340" y1="598" x2="340" y2="618" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="240" y="619" width="200" height="44" rx="8" fill="#FFFFFF" stroke="#639922" stroke-width="1"/>
  <text class="th" x="340" y="641" text-anchor="middle" dominant-baseline="central" fill="#27500A">env.finish() 输出覆盖率</text>

  <line x1="340" y1="663" x2="340" y2="703" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="220" y="724" width="240" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
  <text class="th" x="340" y="746" text-anchor="middle" dominant-baseline="central" fill="#444441">测试结束</text>
</svg>