  <rect x="60" y="216" width="170" height="60" rx="10" fill="#9FE1CB" stroke="#1D9E75" stroke-width="1"/>
  <text class="th" x="145" y="240" text-anchor="middle" dominant-baseline="central" fill="#085041">CacheEnv</text>
  <text class="ts" x="145" y="260" text-anchor="middle" dominant-baseline="central" fill="#085041">时序协调 / 事务管理</text>

  <rect x="250" y="216" width="110" height="40" rx="8" fill="#FFFFFF" stroke="#D85A30" stroke-width="1"/>
