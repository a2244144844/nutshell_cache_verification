  <text class="ts" x="305" y="247" text-anchor="middle" dominant-baseline="central" fill="#712B13">内存模拟</text>

  <rect x="375" y="216" width="110" height="40" rx="8" fill="#FFFFFF" stroke="#D85A30" stroke-width="1"/>
  <text class="ts" x="430" y="231" text-anchor="middle" dominant-baseline="central" fill="#712B13">MockMMIO</text>
  <text class="ts" x="430" y="247" text-anchor="middle" dominant-baseline="central" fill="#712B13">MMIO模拟</text>

  <rect x="500" y="216" width="120" height="40" rx="8" fill="#FFFFFF" stroke="#D85A30" stroke-width="1"/>
  <text class="ts" x="560" y="231" text-anchor="middle" dominant-baseline="central" fill="#712B13">MockCoherence</text>
  <text class="ts" x="560" y="247" text-anchor="middle" dominant-baseline="central" fill="#712B13">一致性探测模拟</text>

  <line x1="230" y1="236" x2="248" y2="236" stroke="#D85A30" stroke-width="1" marker-end="url(#arrow2)"/>
  <line x1="230" y1="246" x2="248" y2="246" stroke="#D85A30" stroke-width="1" marker-end="url(#arrow2)"/>

  <rect x="60" y="288" width="140" height="40" rx="8" fill="#FFFFFF" stroke="#1D9E75" stroke-width="1"/>
  <text class="ts" x="130" y="303" text-anchor="middle" dominant-baseline="central" fill="#085041">DataGenerator</text>
  <text class="ts" x="130" y="320" text-anchor="middle" dominant-baseline="central" fill="#085041">随机事务生成</text>

  <rect x="215" y="288" width="140" height="40" rx="8" fill="#FFFFFF" stroke="#1D9E75" stroke-width="1"/>
  <text class="ts" x="285" y="303" text-anchor="middle" dominant-baseline="central" fill="#085041">Scoreboard</text>
  <text class="ts" x="285" y="320" text-anchor="middle" dominant-baseline="central" fill="#085041">参考模型比对</text>

  <rect x="370" y="288" width="140" height="40" rx="8" fill="#FFFFFF" stroke="#1D9E75" stroke-width="1"/>
  <text class="ts" x="440" y="303" text-anchor="middle" dominant-baseline="central" fill="#085041">Monitor</text>
  <text class="ts" x="440" y="320" text-anchor="middle" dominant-baseline="central" fill="#085041">信号监控采样</text>

  <rect x="525" y="288" width="95" height="40" rx="8" fill="#FAECE7" stroke="#D4537E" stroke-width="1"/>
  <text class="ts" x="572" y="303" text-anchor="middle" dominant-baseline="central" fill="#72243E">CacheCoverage</text>
  <text class="ts" x="572" y="320" text-anchor="middle" dominant-baseline="central" fill="#72243E">Toffee功能覆盖</text>

  <rect x="60" y="340" width="560" height="42" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="1"/>
  <text class="ts" x="340" y="356" text-anchor="middle" dominant-baseline="central" fill="#27500A">Toffee 功能覆盖: 12 CovGroups / 31功能点 / 37覆盖点 (全 100%)</text>
  <text class="ts" x="340" y="374" text-anchor="middle" dominant-baseline="central" fill="#27500A">FG-API | FG-CORE-CACHE | FG-MMIO-FLUSH-COH</text>

  <line x1="340" y1="392" x2="340" y2="414" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow2)"/>

  <!-- Layer 4 -->
  <rect x="40" y="415" width="600" height="66" rx="16" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text class="th" x="60" y="438" fill="#633806">Layer 4 — Picker DUT 包装层</text>
  <text class="ts" x="60" y="460" fill="#633806">DUTCache / _UT_Cache.so · DPI引脚绑定 · XClock · XPort</text>

  <line x1="340" y1="481" x2="340" y2="503" stroke="#BA7517" stroke-width="1" marker-end="url(#arrow2)"/>

  <!-- Layer 5 -->
  <rect x="40" y="504" width="600" height="46" rx="16" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1"/>
  <text class="th" x="60" y="523" fill="#791F1F">Layer 5 — 仿真引擎层 (Verilator + Cache_top.v)</text>

  <line x1="340" y1="550" x2="340" y2="568" stroke="#A32D2D" stroke-width="1" marker-end="url(#arrow2)"/>

  <rect x="190" y="569" width="300" height="46" rx="10" fill="#FFFFFF" stroke="#534AB7" stroke-width="1.5"/>
  <text class="th" x="340" y="588" text-anchor="middle" dominant-baseline="central" fill="#26215C">Cache.v (32KB, 4-Way, 128-Set, 64B/Line)</text>
  <text class="ts" x="340" y="606" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Stage1 → Stage2 → Stage3 三阶段流水线</text>
</svg>