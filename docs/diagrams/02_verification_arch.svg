<svg viewBox="0 0 680 640" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <title>Cache验证环境分层协作框图</title>
  <desc>五层验证架构与组件协作关系</desc>

  <style>
    .th { font-family: -apple-system, sans-serif; font-size: 14px; font-weight: 500; }
    .ts { font-family: -apple-system, sans-serif; font-size: 12px; font-weight: 400; }
  </style>

  <!-- Layer 1 -->
  <rect x="40" y="20" width="600" height="70" rx="16" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text class="th" x="60" y="42" fill="#26215C">Layer 1 — 测试层 (pytest)</text>

  <rect x="60" y="48" width="100" height="32" rx="6" fill="#FFFFFF" stroke="#534AB7" stroke-width="1"/>
  <text class="ts" x="110" y="64" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Smoke</text>

  <rect x="175" y="48" width="100" height="32" rx="6" fill="#FFFFFF" stroke="#534AB7" stroke-width="1"/>
  <text class="ts" x="225" y="64" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Directed (11个)</text>

  <rect x="290" y="48" width="100" height="32" rx="6" fill="#FFFFFF" stroke="#534AB7" stroke-width="1"/>
  <text class="ts" x="340" y="64" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Corner</text>

  <rect x="405" y="48" width="100" height="32" rx="6" fill="#FFFFFF" stroke="#534AB7" stroke-width="1"/>
  <text class="ts" x="455" y="64" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Random</text>

  <rect x="520" y="48" width="100" height="32" rx="6" fill="#FFFFFF" stroke="#534AB7" stroke-width="1"/>
  <text class="ts" x="570" y="64" text-anchor="middle" dominant-baseline="central" fill="#3C3489">conftest</text>

  <line x1="340" y1="90" x2="340" y2="112" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow2)"/>

  <!-- Layer 2 -->
  <rect x="40" y="113" width="600" height="46" rx="16" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text class="th" x="60" y="132" fill="#0C447C">Layer 2 — API 接口层 (Cache_api.py)</text>
  <text class="ts" x="352" y="132" fill="#0C447C">: send / drive / sample / step</text>

  <line x1="340" y1="159" x2="340" y2="181" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow2)"/>

  <!-- Layer 3 -->
  <rect x="40" y="182" width="600" height="210" rx="16" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
