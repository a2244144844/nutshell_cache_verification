mission:
  name: "Track1 NutShell Cache UCAgent Verification"
  prompt:
    system: |
      You are working inside the Track1 NutShell Cache verification workspace.
      Your role is to make each new verification implementation stage visibly
      UCAgent-driven while using Codex as the backend engineering agent.

      Work stage by stage. For each stage:
      1. Inspect the listed files before editing.
      2. Keep changes scoped to that stage.
      3. Run the requested test or regression command.
      4. Create the requested UCAgent output artifact under docs/ucagent_output.
      5. Update docs/test_points.md and docs/ai_collaboration_report.md with
         exact command results.
      6. Call SetCurrentStageJournal with files changed, commands run, and
         pass/fail result.
      7. Call Complete only after the required output files exist.
      8. When a stage is launched with scripts/run_ucagent_stage.sh, call Exit
         immediately after Complete so the run stays on one explicit stage.

mcp_server:
  init_prompt: >
    请先通过 RoleInfo 获取当前 UCAgent 角色信息。完成本阶段前，必须调用
    SetCurrentStageJournal 记录阶段日志，然后调用 Complete；Complete 后立即
    调用 Exit，避免自动推进到后续阶段。

template: ""

template_overwrite:
  OUT: "docs/ucagent_output"

stage:
  - name: cache_regression_audit
    desc: "Audit the current Cache verification regression through UCAgent"
    task:
      - "Inspect README.md, top.md, docs/ucagent_operation_plan.md, docs/test_points.md, and scripts/run_regression.sh."
      - "Run scripts/run_regression.sh from the workspace root."
      - "Create docs/ucagent_output/stage_audit.md."
      - "The audit file must include: stage name, files inspected, command run, exact pass/fail result, any warnings, and whether this stage should be considered UCAgent-driven evidence."
      - "Do not edit source or test files in this audit stage unless the regression command cannot run because of a trivial path issue."
      - "Before completing, call SetCurrentStageJournal with the command result and created output file."
      - "Call Complete after docs/ucagent_output/stage_audit.md exists."
    output_files:
      - "docs/ucagent_output/stage_audit.md"

  - name: backpressure_directed_tests
    desc: "Implement memory and CPU response backpressure directed tests through UCAgent"
    task:
      - "Inspect src/env/cache_env.py, src/utils/simplebus.py, tests/directed, docs/test_points.md, and docs/ai_collaboration_report.md."
      - "Add focused backpressure support to the environment only if needed."
      - "Implement directed tests for io_out_mem_req_ready backpressure and io_in_resp_ready backpressure. Prefer tests/corner/test_backpressure.py unless a more suitable existing directory is justified."
      - "The memory request backpressure test must deassert io_out_mem_req_ready long enough to show the request is held or retried without loss."
      - "The CPU response backpressure test must deassert io_in_resp_ready long enough to show the response is not lost."
      - "Run scripts/run_regression.sh from the workspace root after implementation."
      - "Create docs/ucagent_output/backpressure_stage.md with stage name, files changed, command run, exact pass/fail result, and remaining risks."
      - "Update docs/test_points.md and docs/ai_collaboration_report.md with the exact regression result."
      - "Call SetCurrentStageJournal with changed files and command result before calling Complete."
    output_files:
      - "tests/corner/test_backpressure.py"
      - "docs/test_points.md"
      - "docs/ai_collaboration_report.md"
      - "docs/ucagent_output/backpressure_stage.md"

  - name: crv_coverage_bootstrap
    desc: "Implement constrained random traffic and first functional coverage report through UCAgent"
    task:
      - "Inspect src/env, src/generator, src/utils, tests/random, docs/test_points.md, and docs/coverage_report.md if it exists."
      - "Create or update a constrained random generator for Cache read/write traffic, with deterministic seed support."
      - "Add a small random regression test that uses legal memory addresses, read/write commands, write masks, and a reference model sufficient for checked results."
      - "Create a functional coverage utility that records at least command type, hit/miss proxy, write-mask class, word offset, and refill path coverage."
      - "Add scripts/run_random.sh and scripts/collect_coverage.sh if they do not exist."
      - "Run the narrow random/coverage command and then scripts/run_regression.sh."
      - "Create docs/coverage_report.md with coverage bins, observed counts, gaps, and next closure actions."
      - "Create docs/ucagent_output/crv_coverage_stage.md with changed files, commands run, exact pass/fail result, and coverage summary."
      - "Update docs/ai_collaboration_report.md with this UCAgent stage result."
      - "Call SetCurrentStageJournal with changed files, coverage summary, and command results before calling Complete."
    output_files:
      - "src/generator"
      - "tests/random"
      - "scripts/run_random.sh"
      - "scripts/collect_coverage.sh"
      - "docs/coverage_report.md"
      - "docs/ai_collaboration_report.md"
      - "docs/ucagent_output/crv_coverage_stage.md"

  - name: dirty_writeback_coverage_closure
    desc: "Close the dirty miss writeback/refill coverage gap before bug injection"
    task:
      - "Inspect src/env/cache_env.py, src/utils/simplebus.py, src/utils/cache_coverage.py, tests/directed, tests/random/test_random_cache.py, scripts/run_regression.sh, scripts/collect_coverage.sh, docs/coverage_report.md, docs/test_points.md, docs/ai_collaboration_report.md, and top.md."
      - "Implement a directed dirty-victim eviction/writeback test. Prefer tests/directed/test_dirty_writeback.py unless another existing file is clearly better."
      - "The test should fill all four ways in one cache set with distinct normal memory lines, dirty at least the victim line with a write hit, then access a fifth conflicting line to force a dirty writeback followed by refill."
      - "Check the observed memory request sequence includes WRITE_BURST or WRITE_LAST followed by a READ_BURST/READ refill request, and validate the writeback address/data when practical."
      - "Extend the coverage flow so dirty_miss_writeback_refill is recorded as covered. This may be done by including the directed dirty-writeback transaction in coverage collection or by adding a focused coverage test that exercises the same path."
      - "Run the focused dirty-writeback test, scripts/collect_coverage.sh 7 18, and scripts/run_regression.sh from the workspace root."
      - "Create docs/ucagent_output/dirty_writeback_stage.md with changed files, commands run, exact pass/fail result, coverage delta, and remaining risks."
      - "Update docs/coverage_report.md, docs/test_points.md, docs/ai_collaboration_report.md, README.md, docs/verification_plan.md, docs/ucagent_operation_plan.md, and top.md with this stage result and the new next stage index for bug injection."
      - "Call SetCurrentStageJournal with changed files, coverage summary, and command results before calling Complete."
      - "After Complete, call Exit immediately. Do not start bug_injection_evidence in this run."
    output_files:
      - "tests/directed/test_dirty_writeback.py"
      - "docs/coverage_report.md"
      - "docs/test_points.md"
      - "docs/ai_collaboration_report.md"
      - "docs/ucagent_output/dirty_writeback_stage.md"

  - name: bug_injection_evidence
    desc: "Implement bug-injection evidence and tracking through UCAgent"
    task:
      - "Inspect tests/injected_bug, src/scoreboard, docs/test_points.md, docs/coverage_report.md, and docs/ai_collaboration_report.md."
      - "Design at least one controlled bug-injection scenario that demonstrates the verification environment detects an error. Prefer a Python/reference-model or generated-copy approach that does not permanently corrupt rtl/dut/Cache.v."
      - "The bug evidence must include trigger, expected checker/scoreboard failure, observed failure message, and recovery/disable path."
      - "Create or update tests/injected_bug with the injected-bug test or harness."
      - "Create docs/bug_tracking.md with bug ID, injected fault, trigger, detection path, failure evidence, and cleanup/recovery notes."
      - "Run the injected-bug command and the normal scripts/run_regression.sh to prove the main suite remains clean."
      - "Create docs/ucagent_output/bug_injection_stage.md with changed files, commands run, exact pass/fail result, and remaining risks."
      - "Update docs/ai_collaboration_report.md with this UCAgent stage result."
      - "Call SetCurrentStageJournal with changed files and command results before calling Complete."
    output_files:
      - "tests/injected_bug"
      - "docs/bug_tracking.md"
      - "docs/ai_collaboration_report.md"
      - "docs/ucagent_output/bug_injection_stage.md"

  - name: final_report_package
    desc: "Final report packaging and submission readiness review through UCAgent"
    task:
      - "Inspect README.md, top.md, docs/ai_collaboration_report.md, docs/verification_plan.md, docs/coverage_report.md, docs/bug_tracking.md, docs/test_points.md, docs/ucagent_operation_plan.md, and docs/ucagent_output/."
      - "Review README.md for submission readiness: ensure it clearly states dependencies (Picker, Python, pytest), run commands (run_smoke.sh, run_regression.sh, collect_coverage.sh), reproduce instructions (reproduce.sh), and the current verification status."
      - "Review docs/ai_collaboration_report.md: ensure the AI-human collaboration log is complete, add a Prompt Strategy Review section if missing, and verify the manual-vs-AI decision records cover the configured UCAgent stages."
      - "Review docs/verification_plan.md: ensure Phase 5 current result is accurate and the overall plan reflects actual progress."
      - "Run scripts/reproduce.sh from the workspace root to verify the full reproducibility entry still passes."
      - "Run scripts/run_regression.sh to confirm the regression suite remains clean."
      - "Create docs/ucagent_output/final_report_stage.md with: stage name, files reviewed/changed, commands run, exact results, submission checklist status, and any remaining risks."
      - "Update top.md with any new output files created during this stage."
      - "Call SetCurrentStageJournal with reviewed files, command results, and submission readiness assessment before calling Complete."
    output_files:
      - "docs/ucagent_output/final_report_stage.md"
      - "docs/ai_collaboration_report.md"
      - "README.md"
      - "top.md"

  - name: coherence_probe_directed_test
    desc: "Implement coherence probe hit/miss directed test (DIR-008) through UCAgent and Claude Code"
    task:
      - "Inspect rtl/dut/Cache.v for io_out_coh_req_* and io_out_coh_resp_* signal handling, src/env/cache_env.py for available methods, src/utils/simplebus.py for PROBE command constant, tests/directed for test patterns, and docs/test_points.md for DIR-008 requirements."
      - "The DUT has io_out_coh_req_* input pins (addr, size, cmd, wmask, wdata) and io_out_coh_resp_* output pins (cmd, rdata). A probe request (cmd=PROBE=8) is routed through an arbiter to the inner cache."
      - "The response cmd is 0xc for hit (with data from the cache line) and 0x8 for miss."
      - "Implement a directed test in tests/directed/test_coherence_probe.py covering:"
      - "  1. Probe miss: without any matching line in the cache, send a probe request (cmd=PROBE) via io_out_coh_req_*, verify io_out_coh_resp_valid with cmd=0x8 (miss)."
      - "  2. Probe hit: fill a cache line with known data, send a probe request to the same line via io_out_coh_req_*, verify io_out_coh_resp_valid with cmd=0xc (hit) and correct data on io_out_coh_resp_bits_rdata."
      - "Use env.set_pin/env.get_pin/env.step for driving the probe interface and reading the response. The CPU interface should be idle during probe tests."
      - "Run scripts/run_directed.sh to verify the new test passes alongside existing tests."
      - "Run scripts/run_regression.sh for full regression."
      - "Update docs/test_points.md to mark DIR-008 as implemented."
      - "Create docs/ucagent_output/coherence_probe_stage.md with stage name, files changed, commands run, exact pass/fail result, and remaining risks."
      - "Update docs/ai_collaboration_report.md with this stage result."
      - "Call SetCurrentStageJournal with changed files and command results before calling Complete."
    output_files:
      - "tests/directed/test_coherence_probe.py"
      - "docs/test_points.md"
      - "docs/ai_collaboration_report.md"
      - "docs/ucagent_output/coherence_probe_stage.md"

  - name: flush_directed_test
    desc: "Implement flush behavior directed test (DIR-007) through UCAgent and Claude Code"
    task:
      - "Inspect rtl/dut/Cache.v for io_flush and io_empty signal handling, src/env/cache_env.py for available methods, tests/directed for test patterns, and docs/test_points.md for DIR-007 requirements."
      - "The DUT has io_flush[1:0] input (bit 0 flushes Stage2 pipeline, bit 1 flushes Stage3/CacheStage3), and io_empty output (high when pipeline is empty)."
      - "In CacheStage3: io_flush prevents state transitions from idle, sets needFlush when state != 0, and needFlush returns to idle after output consumed."
      - "Implement a directed test in tests/directed/test_flush_behavior.py covering:"
      - "  1. Flush while idle: assert io_flush=2'b11, verify io_empty stays high, deassert flush, verify cache ready."
      - "  2. Flush after request accepted (in-flight): send a read miss request, assert io_flush during the miss handling, verify io_empty goes high, deassert flush, send new request to verify cache recovered."
      - "  3. Flush recovery: after flush deasserted, verify normal read/write still works."
      - "Use env.set_pin('io_flush', value) and env.get_pin('io_empty') to control and observe flush."
      - "The io_flush default in cache_env.py is 0; tests should set and clear io_flush explicitly."
      - "Run scripts/run_directed.sh to verify the new test passes alongside existing tests."
      - "Run scripts/run_regression.sh for full regression."
      - "Update docs/test_points.md to mark DIR-007 as implemented."
      - "Create docs/ucagent_output/flush_stage.md with stage name, files changed, commands run, exact pass/fail result, and remaining risks."
      - "Update docs/ai_collaboration_report.md with this stage result."
      - "Call SetCurrentStageJournal with changed files and command results before calling Complete."
    output_files:
      - "tests/directed/test_flush_behavior.py"
      - "docs/test_points.md"
      - "docs/ai_collaboration_report.md"
      - "docs/ucagent_output/flush_stage.md"

  - name: write_miss_eviction_replay
    desc: "Replay DIR-011 through DIR-013 through UCAgent and record supplemental evidence"
    task:
      - "Inspect tests/directed/test_write_miss.py, tests/directed/test_clean_eviction.py, tests/directed/test_write_miss_dirty_eviction.py, src/utils/toffee_coverage.py, scripts/run_regression.sh, scripts/collect_coverage.sh, docs/test_points.md, docs/coverage_report.md, docs/ai_collaboration_report.md, docs/ucagent_operation_plan.md, and top.md."
      - "This is a replay and evidence stage. Do not rewrite source or tests unless a trivial path or documentation issue blocks execution."
      - "Run the focused DIR-011/DIR-012/DIR-013 tests from the workspace root with: source scripts/env.sh && /Users/zzy/Workspace/ucagent/.venv/bin/python -m pytest tests/directed/test_write_miss.py tests/directed/test_clean_eviction.py tests/directed/test_write_miss_dirty_eviction.py -q"
      - "Run scripts/run_regression.sh from the workspace root."
      - "Run scripts/collect_coverage.sh 7 18 from the workspace root and confirm Toffee coverage remains 12 groups, 31 points, 37 bins, all covered."
      - "Create docs/ucagent_output/write_miss_eviction_replay_stage.md with stage name, files inspected, commands run, exact pass/fail results, Toffee coverage summary, and a clear statement that DIR-011 through DIR-013 have now been replayed through the UCAgent channel."
      - "Update docs/test_points.md and docs/ai_collaboration_report.md so they note the 2026-05-27 UCAgent replay of DIR-011 through DIR-013 without erasing the historical note that their original implementation was direct-agent work."
      - "Update docs/ucagent_operation_plan.md and top.md to include this supplemental replay stage artifact."
      - "Call SetCurrentStageJournal with inspected files, commands run, exact results, coverage summary, and created artifact before calling Complete."
      - "After Complete, call Exit immediately. Do not start any later stage in this run."
    output_files:
      - "docs/ucagent_output/write_miss_eviction_replay_stage.md"
      - "docs/test_points.md"
      - "docs/ai_collaboration_report.md"
      - "docs/ucagent_operation_plan.md"
      - "top.md"

  - name: line_coverage_closure
    desc: "Close remaining line coverage gaps (Categories H/I/J) through UCAgent"
    task:
      - "Inspect docs/line_coverage_closure_plan.md, docs/coverage_waiver_rationale.md, rtl/dut/Cache.v, tests/conftest.py, src/env/cache_env.py, src/utils/simplebus.py, tests/directed/test_coherence_probe.py, tests/directed/test_flush_behavior.py, docs/test_points.md, docs/coverage_report.md, docs/ai_collaboration_report.md, and top.md."
      - "The line_coverage_closure_plan.md defines three new test scenarios (DIR-014 probe hit full release, DIR-015 read-burst hit, DIR-016 needFlush de-assertion) and one waiver group (Category J: 4 D-cache port lines)."
      - ""
      - "DIR-014 -- Probe hit with full release sequence:"
      - "  Extend tests/directed/test_coherence_probe.py. The existing test_probe_hit_returns_correct_data test breaks immediately after receiving the first probe response beat (cmd=0xC). It never enters s_release state or counts the 8 release data beats."
      - "  Add a new test (e.g. test_probe_hit_full_release_sequence) that:"
      - "    1. Fills a cache line with known data via CPU READ (so probe will hit)."
      - "    2. Sets io_out_coh_resp_ready = 1 before driving the probe."
      - "    3. Drives io_out_coh_req_* with cmd=PROBE."
      - "    4. Waits for io_out_coh_req_valid & io_out_coh_req_ready (probe accepted)."
      - "    5. Clears io_out_coh_req_valid after acceptance."
      - "    6. Waits for io_out_coh_resp_valid (first beat = probe response, cmd=0xC)."
      - "    7. Does NOT break here. Keeps stepping with io_out_coh_resp_ready = 1."
      - "    8. Counts the number of io_out_coh_resp_valid beats (should be 8 total for a full release)."
      - "    9. After io_out_coh_resp_valid deasserts, verify at least 2 beats were observed (probe response + at least 1 release data beat)."
      - "  This covers lines 767-769, 795-797 (probe path in s_idle), and 598-602, 865 (releaseLast counter in s_release)."
      - ""
      - "DIR-015 -- Read-burst hit:"
      - "  Add a new test in tests/directed/ (e.g. test_read_burst_hit.py). The SimpleBus cmd READ_BURST = 4'h2."
      - "  Implement test_read_burst_hit_returns_8_beats that:"
      - "    1. Fills a cache line with 8 distinct word values (one per word offset)."
      - "    2. Sends a CPU request with cmd=READ_BURST to the same line."
      - "    3. The cache should hit (no memory request generated)."
      - "    4. Receives 8 data beats on io_in_resp_* (critical-word-first order from the requested word offset)."
      - "    5. Verifies data correctness for all received beats."
      - "  Use env.set_pin/env.get_pin/env.step for low-level control since the existing send_cpu_request flow may not support multi-beat CPU responses."
      - "  This covers lines 513 (hitReadBurst), 605 (respToL1Fire), 608-610 (respToL1Last counter), 771-772 (s_release transition), 800 (readBeatCnt), and 870 (respToL1Last increment)."
      - ""
      - "DIR-016 -- needFlush de-assertion:"
      - "  Extend tests/directed/test_flush_behavior.py. The existing test_flush_during_miss asserts io_flush during an in-flight miss (setting needFlush) but never issues a follow-up request that triggers the needFlush clear condition (_T_5 & needFlush, i.e. io_out_ready & io_out_valid & needFlush)."
      - "  Add a new test (e.g. test_flush_during_miss_then_recover_with_subsequent_request) that:"
      - "    1. Sends a READ request to a cold address (triggers miss)."
      - "    2. Asserts io_flush = 0b01 while miss is in-flight (sets needFlush)."
      - "    3. Waits for io_empty == 1 (pipeline flushed)."
      - "    4. Deasserts io_flush."
      - "    5. Issues a NEW READ request to a different address (this request's handshake should trigger _T_5 & needFlush, clearing needFlush at line 788)."
      - "    6. Verifies the new request completes correctly."
      - "  This covers lines 558 (needFlush register) and 788 (needFlush de-assertion)."
      - ""
      - "Category J waiver:"
      - "  Update tests/conftest.py. Add lines 420, 460, 2276, 2316 to the existing Cache.v ignore_patterns entry."
      - "  The updated entry becomes: \"Cache.v:138,240-241,263,411,420,460,524,877,901,925,949,2267,2276,2316,2418,2861-2862\""
      - "  These 4 lines are CacheStage3 D-cache ports/wires that are structurally unreachable in the I-cache configuration."
      - ""
      - "After implementing all three tests and the Category J waiver:"
      - "  Run scripts/run_directed.sh to verify new tests pass."
      - "  Run scripts/run_regression.sh for full regression."
      - "  Run scripts/collect_coverage.sh 7 18 to measure line coverage improvement."
      - "  Update docs/test_points.md with DIR-014, DIR-015, DIR-016 entries."
      - "  Update docs/coverage_report.md (auto-generated by collect_coverage.sh)."
      - "  Update docs/ai_collaboration_report.md with this stage result."
      - "  Update docs/line_coverage_closure_plan.md with actual results."
      - "  Update top.md with new output files."
      - "  Create docs/ucagent_output/line_coverage_closure_stage.md with: stage name, files changed, commands run, exact pass/fail results, coverage delta (before → after), and remaining uncovered lines (if any)."
      - "  Call SetCurrentStageJournal with changed files, command results, and coverage delta before calling Complete."
      - "  After Complete, call Exit immediately."
    output_files:
      - "tests/directed/test_coherence_probe.py"
      - "tests/directed/test_read_burst_hit.py"
      - "tests/directed/test_flush_behavior.py"
      - "tests/conftest.py"
      - "docs/test_points.md"
      - "docs/coverage_report.md"
      - "docs/ai_collaboration_report.md"
      - "docs/line_coverage_closure_plan.md"
      - "top.md"
      - "docs/ucagent_output/line_coverage_closure_stage.md"

  - name: genspec_flow_plan_review
    desc: "Review and record the corrected official GenSpec workflow plan through UCAgent"
    task:
      - "Inspect docs/genspec_flow_plan.md, docs/workflow_gap_analysis.md, top.md, unity_test/README.md, unity_test/Cache_basic_info.md, unity_test/Cache_functions_and_checks.md, docs/dut_selection.md, docs/interface_map.md, and rtl/dut/Cache.v."
      - "This is a planning and evidence stage. Do not run the full GenSpec workflow yet, because the official flow includes a human_check stage that must be launched deliberately."
      - "Verify that docs/genspec_flow_plan.md correctly reflects the official GenSpec six-stage sequence: collect_existing_assets, augment_with_code, complete_subspecs, human_check, functional_specification_analysis, and ref_function_line_map_generation."
      - "Verify that the plan maps Cache RTL and existing docs into a dedicated GenSpec overlay workspace instead of overwriting the current executable verification tree."
      - "Update docs/workflow_gap_analysis.md only if needed so it points to docs/genspec_flow_plan.md as the current plan for GenSpec Stages 1-2."
      - "Update top.md only if needed so the plan and stage artifact are indexed."
      - "Create docs/ucagent_output/genspec_flow_plan_stage.md with: stage name, files inspected, plan verdict, exact changes made, and the next command recommended for the actual GenSpec Stage 1-2 run."
      - "Call SetCurrentStageJournal with inspected files, files changed, and the plan verdict before calling Complete."
      - "After Complete, call Exit immediately. Do not start line_coverage_closure or a full GenSpec run in this stage."
    output_files:
      - "docs/genspec_flow_plan.md"
      - "docs/workflow_gap_analysis.md"
      - "top.md"
      - "docs/ucagent_output/genspec_flow_plan_stage.md"

  - name: line_coverage_100
    desc: "Close remaining 5 uncovered lines in CacheStage3 (DIR-017 needFlush lifecycle + DIR-018 respToL1Last counter) through UCAgent and Claude Code"
    task:
      - "Inspect rtl/dut/Cache.v (lines 555-615 CacheStage3 state machine, especially 558-559, 605-610, 787-788), tests/directed/test_flush_behavior.py, tests/directed/test_read_burst_hit.py, tests/directed/test_coherence_probe.py, src/env/cache_env.py, src/utils/simplebus.py, tests/conftest.py, docs/coverage_closure_final.md, docs/coverage_waiver_rationale.md, docs/test_points.md, and docs/ucagent_output/line_coverage_100_stage.md."
      - "The current line coverage is 1359/1364 (99.6%). 5 lines remain uncovered, all in CacheStage3: lines 558, 787-788 (needFlush lifecycle, P0) and lines 605, 608, 610 (respToL1Last counter, P1)."
      - ""
      - "DIR-017 -- needFlush full lifecycle (lines 558, 787-788):"
      - "  The existing test_flush_during_miss_then_recover_with_subsequent_request sets needFlush but may not trigger the exact de-assertion condition (_T_5 & needFlush, i.e. io_out_ready & io_out_valid & needFlush)."
      - "  Add a NEW test named test_needflush_assert_and_deassert in tests/directed/test_flush_behavior.py that uses LOW-LEVEL pin control (not send_cpu_request) for the second request to ensure step-by-step observability of the needFlush clear handshake:"
      - "  1. Send READ to cold addr A via drive_cpu_request + step loop"
      - "  2. Assert io_flush=0b01 during acceptance window → needFlush=1"
      - "  3. Wait for io_empty==1 (pipeline drained)"
      - "  4. Deassert io_flush, step 10 cycles"
      - "  5. Drive NEW READ to cold addr B using manual pin control (env.set_pin for io_in_req_bits_*)"
      - "  6. Also drive io_out_mem_req_ready=1 and handle memory response with low-level pins"
      - "  7. Step cycle-by-cycle, capture io_in_resp_valid beat"
      - "  8. Verify correct response data and user fields"
      - "  Key difference from DIR-016: Second request uses low-level pin driving instead of env.send_cpu_request() to ensure the io_out_ready & io_out_valid handshake with needFlush=1 triggers needFlush <= 0."
      - ""
      - "DIR-018 -- respToL1Last counter (lines 605, 608, 610):"
